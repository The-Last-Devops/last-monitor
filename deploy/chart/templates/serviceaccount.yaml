{{- if .Values.autoUpdate }}
# Auto-update needs the hub to trigger its own rolling redeploy. This grants the
# narrowest possible rights: get/patch on ONLY this one Deployment (resourceNames),
# nothing else in the namespace. Created only when autoUpdate is enabled.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vantage.hub" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vantage.hub" . }}-selfupdate
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["{{ include "vantage.hub" . }}"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vantage.hub" . }}-selfupdate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vantage.hub" . }}-selfupdate
subjects:
  - kind: ServiceAccount
    name: {{ include "vantage.hub" . }}
{{- end }}
