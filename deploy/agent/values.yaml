# vantage AGENT chart — deploy after the hub, with a token you create in the
# UI under Add System. One DaemonSet pod runs per node and pushes host metrics.

image:
  repository: ghcr.io/the-last-devops/vantage-agent
  tag: main              # rolling latest (redeploy to update); pin :X.Y.Z for a stable version
# Auto-update: when true, run the :auto-update image so each agent self-restarts to
# follow the hub (k8s re-pulls). Overrides image.tag. Default false = manual updates.
autoUpdate: false
# Interactive shell/console: when true the agent opens a reverse tunnel so the hub can
# SSH into this host (via the node's sshd on 127.0.0.1). Off by default — enabling it is
# what makes the "Open console" button appear. The node must run sshd, and a user opens
# the shell with their own SSH account + password/key. See docs/exec-design.md.
allowShell: false
pullPolicy: Always       # rolling tags are mutable → Always so a redeploy pulls the new build
pullSecrets: []          # e.g. [ghcr] for private packages

# Where the hub is reachable from inside this cluster.
#  - same cluster as the hub:  http://<release>-hub.<hub-namespace>:8080
#  - different cluster:         the hub's public URL, e.g. https://monitor.senprints.net
hubUrl: ""

# API key from the UI (Add System). Required.
apiKey: ""

# Label that groups this cluster's nodes in the UI (Kubernetes › <cluster>).
cluster: my-cluster

resources:
  requests: { cpu: 20m, memory: 32Mi }
  limits: { memory: 128Mi }
