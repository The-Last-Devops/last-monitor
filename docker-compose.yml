services:
  db:
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER: vantage
      POSTGRES_PASSWORD: vantage
      POSTGRES_DB: vantage_config
      # Postgres 18 moved the image's default data dir; init into an explicit
      # subdir of our mount so the entrypoint doesn't trip over the mount root.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./deploy/init-db.sh:/docker-entrypoint-initdb.d/10-init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantage"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Lightweight DB viewer at http://localhost:8088
  # Login: System=PostgreSQL, Server=db, User=vantage, Pass=vantage,
  #        Database=vantage_config (or vantage_data).
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

  hub:
    build:
      context: .
      dockerfile: deploy/Dockerfile.hub
    environment:
      CONFIG_DATABASE_URL: postgres://vantage:vantage@db:5432/vantage_config
      DATA_DATABASE_URL: postgres://vantage:vantage@db:5432/vantage_data
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info,sqlx=warn
      # First admin (login at http://localhost:8080).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # Auto-provisions the bundled agent's server + token.
      LOCAL_API_KEY: ${LOCAL_API_KEY:-local-dev-token}
      # Passkeys: left unset, the relying party is derived per request from the browser's
      # Origin — passkeys work on whatever domain serves the hub, no config needed. Only
      # set these to PIN one canonical RP (e.g. the hub answers on several hosts):
      # WEBAUTHN_RP_ID=mon.example.com and WEBAUTHN_ORIGIN=https://mon.example.com.
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      # Public-exposure self-check only; set to the hub's public URL in prod.
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      # App secret wrapping SSH-key master keys (set a stable high-entropy value in prod).
      EXEC_APP_SECRET: ${EXEC_APP_SECRET:-}
    ports:
      - "8080:8080"
    # Needed for ICMP "ping" monitors (raw sockets).
    cap_add:
      - NET_RAW
    # Let the optional watchtower auto-updater manage this container (see below).
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      db:
        condition: service_healthy

  # Bundled agent monitoring the Docker host. Always running.
  agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    # Host PID namespace -> host CPU/memory are reported (not the container's).
    pid: host
    environment:
      HUB_URL: http://hub:8080
      API_KEY: ${LOCAL_API_KEY:-local-dev-token}
      INTERVAL: ${AGENT_INTERVAL:-3}
      # Host root mounted below -> reports host disk.
      DISK_PATH: /host
      RUST_LOG: info
    volumes:
      - /:/host:ro
      # Read-only Docker socket → per-container stats (Beszel-style).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - hub

  # Optional auto-update. OFF by default — start it with `--profile autoupdate`:
  #   docker compose --profile autoupdate up -d
  # It watches the registry and recreates the labelled containers (hub, agent) when
  # their image tag gets a new digest, then cleans up the old image.
  # IMPORTANT: it updates PULLED images. For real auto-update, switch hub & agent from
  # `build:` to the published image + always-pull, e.g.:
  #     image: ghcr.io/the-last-devops/vantage-hub:latest   # (agent: vantage-agent)
  #     pull_policy: always
  # Single-host compose recreates in place → a few seconds of downtime (unlike k8s,
  # which surges a new pod first). Interval defaults to 5 min (WATCHTOWER_INTERVAL secs).
  watchtower:
    image: containrrr/watchtower
    profiles: ["autoupdate"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval ${WATCHTOWER_INTERVAL:-300} --cleanup --label-enable

volumes:
  db_data:
